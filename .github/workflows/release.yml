name: Release

on:
  release:
    types: [published]

jobs:
  publish-artifact:
    name: Publish extension artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: prod
      url: https://chromewebstore.google.com/detail/ad-vantage/cojahhgafebkcbophmfofpihokooonod
    env:
      RELEASE_VERSION: ${{ github.event.release.tag_name }}
      EXTENSION_ID: ${{ secrets.EXTENSION_ID }}
      PUBLISHER_ID: ${{ secrets.PUBLISHER_ID }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

    steps:
      - name: Check out released commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production extension
        run: pnpm build

      - name: Package extension
        run: |
          archive="ad-vantage-${RELEASE_VERSION}.zip"
          cd dist
          zip -r "../${archive}" .
          echo "ARCHIVE_NAME=${archive}" >> "$GITHUB_ENV"

      - name: Upload extension archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${RELEASE_VERSION}" "$ARCHIVE_NAME" --clobber

      - name: Check Chrome Web Store configuration
        id: cws-config
        run: |
          missing=0

          for name in EXTENSION_ID PUBLISHER_ID GCP_SERVICE_ACCOUNT_EMAIL GCP_WORKLOAD_IDENTITY_PROVIDER; do
            if [ -z "${!name}" ]; then
              echo "Missing $name; Chrome Web Store publish will be skipped."
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        if: steps.cws-config.outputs.enabled == 'true'
        id: google-auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Publish to Chrome Web Store
        if: steps.cws-config.outputs.enabled == 'true'
        env:
          ACCESS_TOKEN: ${{ steps.google-auth.outputs.access_token }}
        run: |
          api_base="https://chromewebstore.googleapis.com/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}"
          auth_header="Authorization: Bearer ${ACCESS_TOKEN}"

          upload_response="$(curl --fail-with-body --silent --show-error \
            -H "$auth_header" \
            -H "Content-Type: application/zip" \
            -X POST -T "$ARCHIVE_NAME" \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:upload")" || {
              curl_status=$?
              echo "$upload_response" | jq . || echo "$upload_response"
              exit "$curl_status"
            }
          echo "$upload_response" | jq .

          for attempt in {1..12}; do
            upload_state="$(jq -r '.uploadState // empty' <<< "$upload_response")"

            if [ "$upload_state" = "SUCCESS" ]; then
              break
            fi

            if [ "$upload_state" != "UPLOAD_IN_PROGRESS" ]; then
              echo "Chrome Web Store upload failed with state: ${upload_state:-missing}" >&2
              exit 1
            fi

            if [ "$attempt" -eq 12 ]; then
              echo "Chrome Web Store upload did not finish after 12 status checks." >&2
              exit 1
            fi

            sleep 10
            upload_response="$(curl --fail-with-body --silent --show-error \
              -H "$auth_header" \
              "${api_base}:fetchStatus")"
            echo "$upload_response" | jq .
          done

          curl --fail-with-body --silent --show-error \
            -H "$auth_header" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{}' \
            "${api_base}:publish" | jq .
