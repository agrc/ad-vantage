name: Pull Request Events

on: pull_request

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test-check:
    name: Lint and check types
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v7

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 📥 Download dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧶 Lint
        run: pnpm lint

      - name: 🧪 Check types
        run: pnpm check

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v7

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 📥 Download dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run tests
        run: pnpm test

  check-build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v7

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 📥 Download dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build
        run: pnpm build
