<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ad-vantage</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="title-row">
        <div class="brand-block">
          <img id="header-icon" class="header-icon" alt="ad-vantage icon" />
          <h1>ad-vantage</h1>
        </div>
        <span
          id="extension-version"
          class="extension-version"
          aria-label="Extension version"
        ></span>
      </div>
      <p class="subtitle">Vantage Timesheet Enhancer</p>
    </header>

    <main id="main-content">
      <section class="lookup-section" aria-labelledby="lookup-heading">
        <div class="section-heading">
          <h2 id="lookup-heading">Description Lookup</h2>
          <p class="section-copy">
            Fetch task descriptions from ServiceNow to populate the Description
            column and Daily Activity autocomplete.
          </p>
        </div>

        <div class="lookup-actions">
          <button id="sync-btn" class="btn-primary" type="button">
            Fetch from ServiceNow
          </button>
        </div>

        <div id="lookup-summary" class="lookup-summary" aria-live="polite">
          No ServiceNow tasks synced.
        </div>
      </section>

      <section id="column-list-section">
        <h2 class="section-title">Columns</h2>
        <p class="empty-state" id="empty-state">
          Open the Vantage timesheet page to detect columns.
        </p>
        <div id="column-list" hidden></div>
      </section>
    </main>

    <footer>
      <a
        class="footer-link"
        href="https://github.com/agrc/ad-vantage/issues/new/choose"
        target="_blank"
        rel="noreferrer"
      >
        Send Feedback
      </a>
      <button id="reset-btn" class="btn-secondary">Reset All Settings</button>
    </footer>

    <script type="module" src="popup.ts"></script>
  </body>
</html>
